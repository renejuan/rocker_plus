name: Docker

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "40 15 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - r_version: "4.5.2"
            dockerfile: r-deployer/4.5.2/Dockerfile
            tags: |
              renejuan/r-deployer:4.5.2
          - r_version: "4.5.3"
            dockerfile: r-deployer/4.5.3/Dockerfile
            tags: |
              renejuan/r-deployer:4.5.3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push R ${{ matrix.r_version }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ matrix.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=R deployer image based on rocker/r-ver:${{ matrix.r_version }}
          cache-from: type=gha,scope=r-deployer-${{ matrix.r_version }}
          cache-to: type=gha,mode=max,scope=r-deployer-${{ matrix.r_version }}
